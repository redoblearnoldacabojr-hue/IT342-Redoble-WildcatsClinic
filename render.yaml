services:
  - type: web
    name: wildcatclinic-backend
    runtime: java
    plan: free
    rootDir: backend
    buildCommand: ./mvnw -DskipTests package
    startCommand: java -jar target/wildcatclinic-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SUPABASE_DB_PASSWORD
        sync: false
      - key: APP_JWT_SECRET
        sync: false
      - key: APP_ADMIN_EMAILS
        sync: false
      - key: APP_OAUTH2_SUCCESS_REDIRECT_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

  - type: static_site
    name: wildcatclinic-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        sync: false

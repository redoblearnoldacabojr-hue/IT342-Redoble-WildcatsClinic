services:
  - type: web
    name: wildcatclinic-backend
    runtime: java
    plan: free
    rootDir: backend
    buildCommand: ./mvnw -DskipTests package
    startCommand: java -jar target/wildcatclinic-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SERVER_PORT
        value: 10000
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SUPABASE_DB_PASSWORD
        sync: false
      - key: APP_JWT_SECRET
        sync: false
      - key: APP_ADMIN_EMAILS
        sync: false
      - key: APP_OAUTH2_SUCCESS_REDIRECT_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
